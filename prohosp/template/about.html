
{% extends 'base.html' %}
{% load static %}
       
{% block content %}

<section class="container py-4 py-md-5">

    <div class="row align-items-center gy-4">

        <div class="col-md-6">

            <h1 class="fw-bold mb-3 mb-md-4">
                About SP MultiCare
            </h1>

            <p class="mb-3 mb-md-4">
                SP MultiCare provides advanced healthcare services with experienced doctors,
                modern medical facilities, and patient-friendly management systems.
            </p>

            <button class="btn btn-custom mt-2">
                Read More
            </button>

        </div>

        <div class="col-md-6">

           
            <img src="{% static 'images/about.png' %}"
                 class="img-fluid rounded shadow"
                 alt="About SP MultiCare"
                 style="width: 100%; height: auto; object-fit: cover;">

        </div>

    </div>

</section>

<style>
    h1 {
        font-size: clamp(1.5rem, 5vw, 2.5rem);
    }

    p {
        font-size: clamp(0.9rem, 1.3vw, 1.05rem);
        line-height: 1.7;
    }

    .btn-custom {
        font-size: clamp(0.9rem, 1.5vw, 1rem);
        padding: clamp(10px, 1.5vw, 12px) clamp(24px, 3vw, 30px);
    }

    img {
        max-width: 100%;
        height: auto;
        border-radius: clamp(12px, 2vw, 16px);
    }

    @media (max-width: 768px) {
        section {
            text-align: center;
        }

        h1 {
            margin-bottom: 1.5rem;
        }

        img {
            margin-top: 1.5rem;
        }
    }

    @media (max-width: 576px) {
        h1 {
            font-size: 1.5rem;
        }

        p {
            font-size: 0.95rem;
        }
    }
</style>

{% endblock %}
